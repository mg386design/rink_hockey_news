name: Daily Rink Hockey Update

on:
  schedule:
    # 16:00 UTC runs exactly at 5:00 PM BST (UK Summer Time)
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  check-news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          
      - name: Install Dependencies
        run: gem install httparty nokogiri
          
      # Runs your scraper and saves the text output into a temporary file
      - name: Run Gem Updater
        run: |
          ruby -Ilib -e "require 'rink_hockey_news'; RinkHockeyNews.daily_report" > news.txt
          
      # Connects securely to your email and sends the news.txt file contents
      - name: Send Daily Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: 🛼 Daily Rink Hockey News Update
          to: ${{ secrets.EMAIL_USERNAME }}
          from: Rink Hockey Bot
          body: file://news.txt