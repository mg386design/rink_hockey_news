name: Daily Rink Hockey Update

on:
  schedule:
    # 16:00 UTC runs exactly at 5:00 PM BST (UK Summer Time)
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  check-news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          
      - name: Install Dependencies
        run: gem install httparty nokogiri
          
      # Runs your scraper and prints the output straight to your GitHub log
      - name: Run Gem Updater
        run: ruby -Ilib -e "require 'rink_hockey_news'; RinkHockeyNews.daily_report"